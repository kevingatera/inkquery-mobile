name: Homelab Android Release

on:
  push:
    branches:
      - homelab
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  FLUTTER_VERSION: '3.41.5'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version: //p' pubspec.yaml)"
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="inkquery-mobile-homelab-${VERSION}-${SHORT_SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "${APK_NAME}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.apk_name }}
          path: ${{ steps.meta.outputs.apk_name }}
          retention-days: 14

      - name: Publish homelab prerelease
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ steps.meta.outputs.apk_name }}
          body: |
            Automated homelab Android build for commit `${{ github.sha }}`.

            Version: `${{ steps.meta.outputs.version }}`
            Branch: `${{ github.ref_name }}`
          name: Inkquery Mobile Homelab
          prerelease: true
          replacesArtifacts: true
          tag: homelab-latest
